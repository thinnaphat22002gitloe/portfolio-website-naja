services:
  - type: web
    name: tmrw-api
    runtime: docker
    dockerfilePath: ./tmrw-backend/Dockerfile
    dockerContext: ./tmrw-backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tmrw-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@tmrw.unlimited
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: tmrw-db
    plan: free
